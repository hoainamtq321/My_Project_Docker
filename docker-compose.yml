services:
  # Backend: Laravel 12
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_backend
    volumes:
      - ./backend:/var/www
    networks:
      - app-network

  # Database: MySQL 8.0
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - app-network

  # Frontend: React 19 (Vite)
  frontend:
    image: node:22-alpine
    container_name: react_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - app-network

  # Web Server: Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge